name: ci
on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:

# Dedupe runs: a push to a branch with an open PR otherwise fires two identical
# runs (push + pull_request). Keying the group on the commit SHA (identical for
# both events) collapses them into one group; cancel-in-progress keeps a single
# run, so one run alone determines the required-check state.
concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    # Headroom for the playwright `install --with-deps` step, which is slow on cold
    # shared runners and intermittently blew the previous 10-minute budget.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Write reference FX mids (pinned-fallback for deterministic tests)
        env:
          USE_FALLBACK_MIDS: 'true'
        run: pnpm exec tsx scripts/fetch-reference-mids.ts
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:run
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
